<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOC Playbook Generator</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f5f5f4; color: #111; height: 100vh; overflow: hidden; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
  textarea, button, input { font-family: inherit; font-size: 14px; }
  button { cursor: pointer; }
  a { color: inherit; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media print { body { overflow: auto; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const SEV = {
  Critical: { bg:"#FCEBEB", color:"#A32D2D", border:"#F09595" },
  High:     { bg:"#FAEEDA", color:"#854F0B", border:"#FAC775" },
  Medium:   { bg:"#E6F1FB", color:"#185FA5", border:"#85B7EB" },
  Low:      { bg:"#EAF3DE", color:"#3B6D11", border:"#C0DD97" },
};
const PRI = {
  Immediate:    { bg:"#FCEBEB", color:"#A32D2D", border:"#F09595" },
  "Short-term": { bg:"#FAEEDA", color:"#854F0B", border:"#FAC775" },
  "Long-term":  { bg:"#EAF3DE", color:"#3B6D11", border:"#C0DD97" },
};
const TACTIC_BG = {
  "Initial Access":"#E6F1FB","Execution":"#FAEEDA","Persistence":"#EEEDFE",
  "Privilege Escalation":"#FCEBEB","Defense Evasion":"#FBEAF0","Credential Access":"#FAEEDA",
  "Discovery":"#E1F5EE","Lateral Movement":"#FCEBEB","Collection":"#E6F1FB",
  "Exfiltration":"#FCEBEB","Command and Control":"#EEEDFE","Impact":"#FCEBEB",
};
const TABS = [
  { key:"summary",     label:"Summary"       },
  { key:"playbook",    label:"IR Playbook"   },
  { key:"detection",   label:"Detection"     },
  { key:"checklist",   label:"Checklist"     },
  { key:"remediation", label:"Remediation"   },
  { key:"mitre",       label:"MITRE ATT&CK"  },
];
const EXAMPLES = [
  "Ransomware on Windows endpoints, lateral movement via SMB detected",
  "Encoded PowerShell execution from HR workstation",
  "Brute force on Azure AD — 500+ failed logins in 10 min",
  "Phishing email with macro-enabled Excel attachment opened",
];
const SYSTEM = `You are a senior SOC analyst. Given a threat or incident description, output ONLY a JSON object — no markdown, no preamble, no trailing text. Be concise: max 3 steps per phase, max 3 items per array, max 4 MITRE techniques.

{
  "severity": "Critical|High|Medium|Low",
  "threat_type": "Short category e.g. Ransomware",
  "summary": "2 sentence incident overview",
  "playbook": [{"phase":"Phase name","steps":["step"]}],
  "detection": {
    "siem_rules": ["rule — max 2"],
    "soar_actions": ["action — max 3"],
    "iocs": ["ioc — max 3"]
  },
  "checklist": [{"category":"Name","items":["item — max 3 per category, max 3 categories"]}],
  "remediation": [{"step":1,"title":"Short","action":"Detail","priority":"Immediate|Short-term|Long-term"}],
  "mitre": [{"tactic":"Name","technique_id":"T1234","technique_name":"Name","description":"1 sentence","mitigations":["M1234 - Name"]}]
}`;

function Badge({ label, meta }) {
  const m = meta[label] || meta[Object.keys(meta)[0]];
  return <span style={{ fontSize:11, padding:"2px 9px", borderRadius:99, background:m.bg, color:m.color, border:`0.5px solid ${m.border}`, fontWeight:600, whiteSpace:"nowrap" }}>{label}</span>;
}

function CheckRow({ text, id, checked, onToggle }) {
  return (
    <div onClick={() => onToggle(id)} style={{ display:"flex", gap:10, padding:"8px 0", borderBottom:"0.5px solid #e5e7eb", cursor:"pointer", alignItems:"flex-start" }}>
      <div style={{ minWidth:16, height:16, borderRadius:4, border:"1px solid #d1d5db", background: checked ? "#111" : "#fff", display:"flex", alignItems:"center", justifyContent:"center", marginTop:2, flexShrink:0 }}>
        {checked && <svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#fff" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      </div>
      <span style={{ fontSize:13, color: checked ? "#9ca3af" : "#111", textDecoration: checked ? "line-through" : "none", lineHeight:1.6 }}>{text}</span>
    </div>
  );
}

function App() {
  const [apiKey, setApiKey]     = useState(() => localStorage.getItem("soc_api_key") || "");
  const [showKey, setShowKey]   = useState(false);
  const [input, setInput]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [playbook, setPlaybook] = useState(null);
  const [tab, setTab]           = useState("summary");
  const [checks, setChecks]     = useState({});
  const [error, setError]       = useState("");
  const [log, setLog]           = useState([]);

  function saveKey(k) { setApiKey(k); localStorage.setItem("soc_api_key", k); }
  function toggleCheck(id) { setChecks(s => ({ ...s, [id]: !s[id] })); }
  function addLog(msg) { setLog(p => [...p, msg]); }

  async function generate() {
    if (!input.trim() || loading) return;
    if (!apiKey.trim()) { setError("Please enter your Anthropic API key first."); return; }
    setLoading(true); setError(""); setPlaybook(null); setChecks({}); setLog([]);
    try {
      addLog("1. Sending request...");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 4000,
          system: SYSTEM,
          messages: [{ role:"user", content: input }],
        }),
      });
      addLog(`2. Status: ${res.status}`);
      const data = await res.json();
      if (!res.ok) throw new Error(`API ${res.status}: ${data?.error?.message || JSON.stringify(data)}`);
      const raw = data.content?.find(b => b.type === "text")?.text || "";
      addLog(`3. Received ${raw.length} chars`);
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("No JSON found in response");
      setPlaybook(JSON.parse(match[0]));
      setLog([]); setTab("summary");
    } catch(e) {
      setError(e.message);
    }
    setLoading(false);
  }

  function exportPDF() {
    if (!playbook) return;
    const sc = SEV[playbook.severity] || SEV.Medium;
    const w = window.open("", "_blank");
    const phases = (playbook.playbook||[]).map(ph=>`<div style="margin-bottom:14px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden"><div style="background:#f9fafb;padding:9px 14px;font-weight:600;font-size:13px;border-bottom:1px solid #e5e7eb">${ph.phase}</div><div style="padding:10px 14px">${(ph.steps||[]).map((s,i)=>`<div style="display:flex;gap:8px;margin-bottom:7px"><span style="color:#9ca3af;font-family:monospace;min-width:18px;font-size:11px">${String(i+1).padStart(2,"0")}</span><span style="font-size:13px">${s}</span></div>`).join("")}</div></div>`).join("");
    const det = ["siem_rules","soar_actions","iocs"].map(k=>({key:k,label:k==="siem_rules"?"SIEM Rules":k==="soar_actions"?"SOAR Actions":"IOCs",mono:k!=="soar_actions"})).map(({key,label,mono})=>`<div style="margin-bottom:14px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden"><div style="background:#f9fafb;padding:9px 14px;font-weight:600;font-size:13px;border-bottom:1px solid #e5e7eb">${label}</div><div style="padding:10px 14px">${(playbook.detection?.[key]||[]).map(r=>`<div style="margin-bottom:6px;padding:${mono?"7px 10px":"4px 0"};background:${mono?"#f3f4f6":"none"};border-radius:${mono?"5px":"0"};font-family:${mono?"monospace":"inherit"};font-size:12px">${r}</div>`).join("")}</div></div>`).join("");
    const chk = (playbook.checklist||[]).map(cat=>`<div style="margin-bottom:14px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden"><div style="background:#f9fafb;padding:9px 14px;font-weight:600;font-size:13px;border-bottom:1px solid #e5e7eb">${cat.category}</div><div style="padding:8px 14px">${(cat.items||[]).map(item=>`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;align-items:center"><div style="width:13px;height:13px;border:1px solid #d1d5db;border-radius:3px;flex-shrink:0"></div><span style="font-size:13px">${item}</span></div>`).join("")}</div></div>`).join("");
    const rem = (playbook.remediation||[]).map(r=>{const pc=PRI[r.priority]||PRI["Long-term"];return`<div style="display:flex;gap:12px;padding:11px 13px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:8px"><div style="min-width:22px;height:22px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">${r.step}</div><div><div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><span style="font-weight:600;font-size:13px">${r.title}</span><span style="font-size:11px;padding:2px 7px;border-radius:99px;background:${pc.bg};color:${pc.color};border:1px solid ${pc.border}">${r.priority}</span></div><div style="font-size:13px;color:#6b7280">${r.action}</div></div></div>`}).join("");
    const mit = (playbook.mitre||[]).map(t=>`<div style="margin-bottom:11px;border:1px solid #e5e7eb;border-radius:8px;padding:12px 14px"><div style="display:flex;gap:8px;margin-bottom:5px;align-items:center"><span style="font-family:monospace;font-size:12px;background:#f3f4f6;padding:2px 7px;border-radius:4px">${t.technique_id}</span><span style="font-weight:600;font-size:13px">${t.technique_name}</span><span style="font-size:11px;color:#6b7280;background:#f9fafb;border:1px solid #e5e7eb;padding:2px 8px;border-radius:99px;margin-left:auto">${t.tactic}</span></div><div style="font-size:13px;color:#374151;margin-bottom:7px">${t.description}</div>${(t.mitigations||[]).map(m=>`<div style="font-size:12px;color:#6b7280;margin-top:2px">→ ${m}</div>`).join("")}</div>`).join("");
    w.document.write(`<!DOCTYPE html><html><head><title>SOC Playbook — ${playbook.threat_type}</title><style>body{font-family:-apple-system,sans-serif;color:#111;padding:36px;max-width:860px;margin:auto}h2{font-size:15px;font-weight:700;margin:28px 0 10px;border-bottom:1px solid #e5e7eb;padding-bottom:6px}@media print{body{padding:16px}}</style></head><body>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:18px;border-bottom:2px solid #e5e7eb">
      <div><div style="font-size:20px;font-weight:700">SOC Incident Playbook</div><div style="font-size:13px;color:#6b7280;margin-top:3px">${playbook.threat_type} · ${new Date().toLocaleDateString()}</div></div>
      <span style="margin-left:auto;padding:4px 13px;border-radius:99px;background:${sc.bg};color:${sc.color};border:1px solid ${sc.border};font-weight:700;font-size:12px">${playbook.severity}</span>
    </div>
    <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px;font-size:14px;line-height:1.7;margin-bottom:6px">${playbook.summary}</div>
    <h2>Incident Response Playbook</h2>${phases}<h2>Detection Rules</h2>${det}<h2>Investigation Checklist</h2>${chk}<h2>Remediation Runbook</h2>${rem}<h2>MITRE ATT&CK Mapping</h2>${mit}
    </body></html>`);
    w.document.close();
    setTimeout(() => w.print(), 400);
  }

  const s = {
    app:       { display:"flex", height:"100vh", overflow:"hidden" },
    sidebar:   { width:300, minWidth:260, borderRight:"1px solid #e5e7eb", display:"flex", flexDirection:"column", background:"#fafafa", overflowY:"auto" },
    sHead:     { padding:"14px 16px", borderBottom:"1px solid #e5e7eb" },
    sBody:     { padding:"14px 16px", borderBottom:"1px solid #e5e7eb", display:"flex", flexDirection:"column", gap:10 },
    label:     { fontSize:11, color:"#6b7280", display:"block", marginBottom:5, textTransform:"uppercase", letterSpacing:"0.05em" },
    textarea:  { width:"100%", resize:"vertical", fontSize:13, padding:"9px 11px", borderRadius:6, border:"1px solid #d1d5db", background:"#fff", color:"#111", lineHeight:1.6 },
    btnPrim:   { flex:1, padding:"8px 12px", borderRadius:6, border:"1px solid #d1d5db", background:"#fff", color:"#111", fontWeight:500, fontSize:13 },
    btnSec:    { padding:"8px 11px", borderRadius:6, border:"1px solid #d1d5db", background:"#fff", color:"#111", fontWeight:500, fontSize:13 },
    main:      { flex:1, display:"flex", flexDirection:"column", overflow:"hidden" },
    tabBar:    { display:"flex", borderBottom:"1px solid #e5e7eb", padding:"0 1rem", background:"#fafafa", flexShrink:0, overflowX:"auto" },
    content:   { flex:1, overflowY:"auto", padding:"1.25rem 1.5rem" },
    card:      { border:"1px solid #e5e7eb", borderRadius:8, overflow:"hidden", marginBottom:12 },
    cardHead:  { padding:"10px 16px", background:"#f9fafb", borderBottom:"1px solid #e5e7eb", fontWeight:600, fontSize:13 },
    cardBody:  { padding:"12px 16px" },
  };

  return (
    <div style={s.app}>
      <div style={s.sidebar}>
        <div style={s.sHead}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
            <div style={{ width:28, height:28, borderRadius:6, background:"#eff6ff", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="#2563eb" strokeWidth="1.2"/><path d="M4 5h6M4 7h6M4 9h4" stroke="#2563eb" strokeWidth="1.2" strokeLinecap="round"/></svg>
            </div>
            <span style={{ fontSize:14, fontWeight:600 }}>SOC Playbook Generator</span>
          </div>
          <div style={{ fontSize:11, color:"#9ca3af" }}>Enterprise incident response · AI-powered</div>
        </div>

        <div style={s.sBody}>
          <div>
            <label style={s.label}>Anthropic API Key</label>
            <div style={{ display:"flex", gap:6 }}>
              <input type={showKey ? "text" : "password"} value={apiKey} onChange={e => saveKey(e.target.value)} placeholder="sk-ant-..." style={{ flex:1, padding:"7px 10px", borderRadius:6, border:"1px solid #d1d5db", background:"#fff", color:"#111", fontSize:12, fontFamily:"monospace" }} />
              <button onClick={() => setShowKey(v => !v)} style={{ padding:"7px 10px", borderRadius:6, border:"1px solid #d1d5db", background:"#fff", fontSize:11, color:"#6b7280" }}>{showKey ? "Hide" : "Show"}</button>
            </div>
            <div style={{ fontSize:11, color:"#9ca3af", marginTop:3 }}>Saved locally in your browser · never sent anywhere else</div>
          </div>
          <div>
            <label style={s.label}>Incident description</label>
            <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key==="Enter" && (e.metaKey||e.ctrlKey) && generate()} placeholder="Describe the threat or incident in plain language..." rows={6} style={s.textarea} />
            <div style={{ fontSize:11, color:"#9ca3af", marginTop:3 }}>⌘ Enter to generate</div>
          </div>
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={generate} disabled={loading || !input.trim()} style={{ ...s.btnPrim, opacity: loading || !input.trim() ? 0.45 : 1, cursor: loading || !input.trim() ? "not-allowed" : "pointer" }}>
              {loading ? "Generating..." : "Generate ↗"}
            </button>
            {playbook && <button onClick={exportPDF} style={s.btnSec}>PDF</button>}
          </div>
        </div>

        {playbook && (
          <div style={{ padding:"12px 16px", borderBottom:"1px solid #e5e7eb" }}>
            <div style={{ fontSize:11, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:8 }}>Active incident</div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:5 }}>
              <span style={{ fontSize:13, fontWeight:600 }}>{playbook.threat_type}</span>
              <Badge label={playbook.severity} meta={SEV} />
            </div>
            <div style={{ fontSize:12, color:"#6b7280", lineHeight:1.5 }}>{playbook.summary?.slice(0,100)}...</div>
          </div>
        )}

        <div style={{ padding:"12px 16px" }}>
          <div style={{ fontSize:11, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:8 }}>Quick examples</div>
          <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
            {EXAMPLES.map((ex,i) => (
              <button key={i} onClick={() => setInput(ex)} style={{ textAlign:"left", padding:"7px 10px", borderRadius:6, border:"1px solid #e5e7eb", background:"#fff", color:"#6b7280", fontSize:12, lineHeight:1.5 }}>{ex}</button>
            ))}
          </div>
        </div>

        {(error || log.length > 0) && (
          <div style={{ padding:"0 16px 14px", display:"flex", flexDirection:"column", gap:6 }}>
            {error && <div style={{ padding:"8px 11px", borderRadius:6, background:"#fef2f2", color:"#b91c1c", fontSize:12, lineHeight:1.5, border:"1px solid #fecaca" }}>{error}</div>}
            {log.length > 0 && <div style={{ padding:"8px 11px", borderRadius:6, background:"#f9fafb", color:"#6b7280", fontSize:11, fontFamily:"monospace", border:"1px solid #e5e7eb", whiteSpace:"pre-wrap", lineHeight:1.6 }}>{log.join("\n")}</div>}
          </div>
        )}
      </div>

      <div style={s.main}>
        {!playbook && !loading && (
          <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:10, color:"#9ca3af" }}>
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="8" y="6" width="32" height="36" rx="4" stroke="#d1d5db" strokeWidth="1.5"/><path d="M16 16h16M16 22h16M16 28h10" stroke="#d1d5db" strokeWidth="1.5" strokeLinecap="round"/><circle cx="36" cy="36" r="8" fill="#fff" stroke="#d1d5db" strokeWidth="1.5"/><path d="M33 36l2 2 4-4" stroke="#d1d5db" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            <div style={{ fontSize:14, fontWeight:500, color:"#6b7280" }}>No playbook generated yet</div>
            <div style={{ fontSize:12 }}>Enter your API key and describe an incident to get started</div>
          </div>
        )}
        {loading && (
          <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12 }}>
            <div style={{ width:28, height:28, border:"2px solid #e5e7eb", borderTop:"2px solid #6b7280", borderRadius:"50%", animation:"spin 0.9s linear infinite" }} />
            <div style={{ fontSize:13, color:"#6b7280" }}>Analyzing threat and generating playbook...</div>
          </div>
        )}

        {playbook && (
          <>
            <div style={s.tabBar}>
              {TABS.map(t => (
                <button key={t.key} onClick={() => setTab(t.key)} style={{ padding:"10px 14px", border:"none", borderBottom: tab===t.key ? "2px solid #111" : "2px solid transparent", background:"none", fontSize:12, fontWeight: tab===t.key ? 600 : 400, color: tab===t.key ? "#111" : "#6b7280", whiteSpace:"nowrap" }}>{t.label}</button>
              ))}
            </div>

            <div style={s.content}>

              {tab==="summary" && (
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                  <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                    {[["Severity", <Badge label={playbook.severity} meta={SEV} />], ["Threat type", <strong style={{ fontSize:13 }}>{playbook.threat_type}</strong>], ["MITRE tactics", <strong style={{ fontSize:13 }}>{playbook.mitre?.length||0} mapped</strong>]].map(([lbl, val], i) => (
                      <div key={i} style={{ background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:8, padding:"10px 14px", minWidth:120 }}>
                        <div style={{ fontSize:11, color:"#9ca3af", marginBottom:5, textTransform:"uppercase", letterSpacing:"0.04em" }}>{lbl}</div>
                        {val}
                      </div>
                    ))}
                  </div>
                  <div style={{ background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:8, padding:"1rem 1.25rem", lineHeight:1.7, fontSize:14 }}>{playbook.summary}</div>
                  <div>
                    <div style={{ fontSize:11, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:8 }}>ATT&CK tactics detected</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                      {(playbook.mitre||[]).map((t,i) => (
                        <span key={i} onClick={() => setTab("mitre")} style={{ fontSize:12, padding:"4px 10px", borderRadius:99, background: TACTIC_BG[t.tactic]||"#f3f4f6", color:"#374151", border:"1px solid #e5e7eb", cursor:"pointer" }}>{t.tactic}</span>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {tab==="playbook" && (playbook.playbook||[]).map((phase,i) => (
                <div key={i} style={s.card}>
                  <div style={{ ...s.cardHead, display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ width:22, height:22, borderRadius:"50%", background:"#e5e7eb", display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:600 }}>{i+1}</span>
                    {phase.phase}
                  </div>
                  <div style={{ ...s.cardBody, display:"flex", flexDirection:"column", gap:8 }}>
                    {(phase.steps||[]).map((step,j) => (
                      <div key={j} style={{ display:"flex", gap:10, fontSize:13, lineHeight:1.6 }}>
                        <span style={{ color:"#9ca3af", fontFamily:"monospace", fontSize:11, minWidth:20, paddingTop:2 }}>{String(j+1).padStart(2,"0")}</span>
                        <span>{step}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}

              {tab==="detection" && [{key:"siem_rules",label:"SIEM rules",mono:true},{key:"soar_actions",label:"SOAR actions",mono:false},{key:"iocs",label:"Indicators of compromise",mono:true}].map(({key,label,mono}) => (
                <div key={key} style={s.card}>
                  <div style={s.cardHead}>{label}</div>
                  <div style={{ ...s.cardBody, display:"flex", flexDirection:"column", gap:6 }}>
                    {(playbook.detection?.[key]||[]).map((item,i) => (
                      <div key={i} style={{ padding: mono?"8px 12px":"5px 0", background: mono?"#f3f4f6":"none", borderRadius: mono?6:0, fontFamily: mono?"monospace":"inherit", fontSize: mono?12:13, lineHeight:1.6, borderBottom: !mono?"1px solid #f3f4f6":"none" }}>
                        {!mono && <span style={{ color:"#9ca3af", marginRight:8 }}>→</span>}
                        {item}
                      </div>
                    ))}
                  </div>
                </div>
              ))}

              {tab==="checklist" && (playbook.checklist||[]).map((cat,ci) => (
                <div key={ci} style={s.card}>
                  <div style={{ ...s.cardHead, display:"flex", justifyContent:"space-between" }}>
                    <span>{cat.category}</span>
                    <span style={{ fontSize:12, color:"#9ca3af", fontWeight:400 }}>{(cat.items||[]).filter((_,ii) => checks[`${ci}-${ii}`]).length}/{(cat.items||[]).length} done</span>
                  </div>
                  <div style={{ padding:"6px 16px" }}>
                    {(cat.items||[]).map((item,ii) => <CheckRow key={ii} text={item} id={`${ci}-${ii}`} checked={!!checks[`${ci}-${ii}`]} onToggle={toggleCheck} />)}
                  </div>
                </div>
              ))}

              {tab==="remediation" && (playbook.remediation||[]).map((r,i) => {
                const pc = PRI[r.priority]||PRI["Long-term"];
                return (
                  <div key={i} style={{ display:"flex", gap:14, padding:"12px 14px", border:"1px solid #e5e7eb", borderRadius:8, marginBottom:10 }}>
                    <div style={{ minWidth:24, height:24, borderRadius:"50%", background:"#f3f4f6", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:600, flexShrink:0, marginTop:1 }}>{r.step}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4, flexWrap:"wrap" }}>
                        <span style={{ fontWeight:600, fontSize:13 }}>{r.title}</span>
                        <Badge label={r.priority} meta={PRI} />
                      </div>
                      <div style={{ fontSize:13, color:"#6b7280", lineHeight:1.6 }}>{r.action}</div>
                    </div>
                  </div>
                );
              })}

              {tab==="mitre" && (
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  <div style={{ fontSize:12, color:"#6b7280", marginBottom:4 }}>Techniques mapped to the MITRE ATT&CK framework based on the incident</div>
                  {(playbook.mitre||[]).map((t,i) => (
                    <div key={i} style={s.card}>
                      <div style={{ ...s.cardHead, background: TACTIC_BG[t.tactic]||"#f9fafb", display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                        <a href={`https://attack.mitre.org/techniques/${t.technique_id}`} target="_blank" rel="noreferrer" style={{ fontFamily:"monospace", fontSize:12, background:"rgba(255,255,255,0.7)", padding:"2px 8px", borderRadius:4, color:"#374151", textDecoration:"none", border:"1px solid rgba(0,0,0,0.08)" }}>{t.technique_id}</a>
                        <span style={{ fontWeight:600, fontSize:13 }}>{t.technique_name}</span>
                        <span style={{ marginLeft:"auto", fontSize:11, padding:"2px 9px", borderRadius:99, background:"rgba(255,255,255,0.6)", color:"#374151", border:"1px solid rgba(0,0,0,0.08)", fontWeight:400 }}>{t.tactic}</span>
                      </div>
                      <div style={s.cardBody}>
                        <div style={{ fontSize:13, lineHeight:1.6, marginBottom:10 }}>{t.description}</div>
                        {(t.mitigations||[]).length > 0 && (
                          <>
                            <div style={{ fontSize:11, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:6 }}>Mitigations</div>
                            {t.mitigations.map((m,j) => (
                              <div key={j} style={{ fontSize:12, color:"#6b7280", padding:"4px 0", borderTop:"1px solid #f3f4f6", display:"flex", gap:8 }}>
                                <span style={{ color:"#d1d5db" }}>→</span>{m}
                              </div>
                            ))}
                          </>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}

            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
